# docker-compose.prod.yml — produkcija na strežniku (aaPanel)
# Uporaba:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod pull
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  app:
    image: iztokvozlic/gorivo:latest
    container_name: gorivo-app
    ports:
      - "127.0.0.1:8083:80"    # dostopen samo lokalno — aaPanel nginx proxira
    environment:
      APP_NAME: "Gorivo"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_LOCALE: sl
      APP_FALLBACK_LOCALE: en
      AVAILABLE_LANGUAGES: sl,en,de,it,hr
      AVAILABLE_COLOR_THEMES: zinc,amber,blue,emerald,orange
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: pgsql
      DB_HOST: postgres          # ime postgres servica spodaj
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database      # NE CACHE_DRIVER — Laravel 11+
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-info@gorivo.si}
      MAIL_FROM_NAME: "Gorivo"
      NOTIFICATION_ENABLE_PORTAL: "true"
      NOTIFICATION_ENABLE_EMAIL: "true"
      NOTIFICATION_ENABLE_SMS: "false"
      TRUSTED_PROXIES: "*"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_uploads:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    restart: always
    networks:
      - gorivo

  postgres:
    image: postgres:16-alpine
    container_name: gorivo-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - gorivo

volumes:
  postgres_data:
  storage_uploads:
  storage_logs:

networks:
  gorivo:
    driver: bridge
