# docker-compose.yml — lokalno testiranje z Docker Build
# Uporaba: docker compose up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: iztokvozlic/gorivo:latest
    ports:
      - "8080:80"
    environment:
      APP_NAME: "Gorivo"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_LOCALE: sl
      APP_FALLBACK_LOCALE: en
      AVAILABLE_LANGUAGES: sl,en,de,it,hr
      AVAILABLE_COLOR_THEMES: zinc,amber,blue,emerald,orange
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: gorivo
      DB_USERNAME: gorivo
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@gorivo.si}
      MAIL_FROM_NAME: "Gorivo"
      NOTIFICATION_ENABLE_PORTAL: "true"
      NOTIFICATION_ENABLE_EMAIL: "true"
      NOTIFICATION_ENABLE_SMS: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_uploads:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"    # lokalno: localhost:5434 (5432/5433 je mogoče zaseden)
    environment:
      POSTGRES_DB: gorivo
      POSTGRES_USER: gorivo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gorivo -d gorivo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  storage_uploads:
  storage_logs:
